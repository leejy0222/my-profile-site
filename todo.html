<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간단한 투두 리스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 1px solid #333333;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background-color: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #6495ff;
            background-color: #0a0a0a;
        }

        button {
            padding: 12px 24px;
            background-color: #6495ff;
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        button:hover {
            background-color: #5080e8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(100, 149, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background-color: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .todo-item:hover {
            border-color: #333333;
            background-color: #121212;
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #666666;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #6495ff;
        }

        .todo-text {
            flex: 1;
            font-size: 14px;
            color: #d4d4d8;
            word-break: break-word;
        }

        .delete-btn {
            background-color: #ef4444;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
        }

        .delete-btn:hover {
            background-color: #dc2626;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .empty-message {
            text-align: center;
            color: #666666;
            font-size: 14px;
            padding: 40px 20px;
            font-style: italic;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #222222;
            text-align: center;
            font-size: 13px;
            color: #999999;
        }

        .stat {
            flex: 1;
        }

        .stat-number {
            display: block;
            font-size: 20px;
            font-weight: 600;
            color: #6495ff;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 투두 리스트</h1>

        <div class="input-group">
            <input
                type="text"
                id="todoInput"
                placeholder="할 일을 입력하세요..."
                autocomplete="off"
            >
            <button onclick="addTodo()">추가</button>
        </div>

        <div class="todo-list" id="todoList">
            <div class="empty-message">할 일을 추가해주세요 ✨</div>
        </div>

        <div class="stats">
            <div class="stat">
                <span class="stat-number" id="totalCount">0</span>
                <span>전체</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="completeCount">0</span>
                <span>완료</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="remainingCount">0</span>
                <span>남은 것</span>
            </div>
        </div>
    </div>

    <script>
        const todoInput = document.getElementById('todoInput');
        const todoList = document.getElementById('todoList');
        const totalCount = document.getElementById('totalCount');
        const completeCount = document.getElementById('completeCount');
        const remainingCount = document.getElementById('remainingCount');

        let todos = JSON.parse(localStorage.getItem('todos')) || [];

        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const remaining = total - completed;

            totalCount.textContent = total;
            completeCount.textContent = completed;
            remainingCount.textContent = remaining;
        }

        function renderTodos() {
            if (todos.length === 0) {
                todoList.innerHTML = '<div class="empty-message">할 일을 추가해주세요 ✨</div>';
                updateStats();
                return;
            }

            todoList.innerHTML = todos.map((todo, index) => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <input
                        type="checkbox"
                        ${todo.completed ? 'checked' : ''}
                        onchange="toggleTodo(${index})"
                    >
                    <span class="todo-text">${escapeHtml(todo.text)}</span>
                    <button class="delete-btn" onclick="deleteTodo(${index})">삭제</button>
                </div>
            `).join('');

            updateStats();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addTodo() {
            const text = todoInput.value.trim();
            if (text === '') {
                todoInput.focus();
                return;
            }

            todos.push({ text, completed: false });
            todoInput.value = '';
            saveTodos();
            renderTodos();
            todoInput.focus();
        }

        function toggleTodo(index) {
            todos[index].completed = !todos[index].completed;
            saveTodos();
            renderTodos();
        }

        function deleteTodo(index) {
            todos.splice(index, 1);
            saveTodos();
            renderTodos();
        }

        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTodo();
            }
        });

        renderTodos();
    </script>
</body>
</html>
